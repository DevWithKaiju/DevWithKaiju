name: Update Profile SVGs

on:
  schedule:
    - cron: "0 0 * * *"       # Daily at UTC 0:00 (JST 9:00)
  workflow_dispatch:           # Manual trigger
  push:
    branches: [main]
    paths: ["scripts/**"]      # Re-run when scripts change

permissions:
  contents: write

jobs:
  update-svgs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_profile.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/
          git diff --staged --quiet || (git commit -m "🦖 update profile SVGs" && git push)
