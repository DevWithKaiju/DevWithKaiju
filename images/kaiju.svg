<svg xmlns="http://www.w3.org/2000/svg" width="420" height="320" viewBox="0 0 420 320">
  <defs>
    <linearGradient id="purpleMintGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B8EC4" />
      <stop offset="100%" stop-color="#A8D8C8" />
    </linearGradient>
    <linearGradient id="purpleMintGradH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9B8EC4" />
      <stop offset="100%" stop-color="#A8D8C8" />
    </linearGradient>
    <linearGradient id="cardBorderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B8EC4" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#A8D8C8" stop-opacity="0.5" />
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="subtleShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1E1833" flood-opacity="0.5" />
    </filter>
    
    <linearGradient id="xpBarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9B8EC4" />
      <stop offset="100%" stop-color="#A8D8C8" />
    </linearGradient>
    
  </defs>
  <style>
    text { font-family: 'Segoe UI', 'Helvetica Neue', Ubuntu, Arial, sans-serif; }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes xpGrow {
      from { width: 0; }
      to { width: 211.0px; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    .kaiju-art { animation: float 3s ease-in-out infinite; }
    
  </style>
  <rect x="0" y="0" width="420" height="320" rx="16" fill="#1E1833" />
  <rect x="0" y="0" width="420" height="320" rx="16" fill="none" stroke="url(#cardBorderGrad)" stroke-width="1.5" />
  <text x="210.0" y="30" font-size="17" fill="#D4CCE6" text-anchor="middle" font-weight="700" >🦖  Junior Kaiju</text>
  <rect x="180.0" y="38" width="60" height="22" rx="11" fill="#2D2640" stroke="url(#purpleMintGrad)" stroke-width="1.2" />
  <text x="210.0" y="54" font-size="11" fill="#A8D8C8" text-anchor="middle" font-weight="700" >Lv. 21</text>
  <g class="kaiju-art">

  <g transform="translate(210.0,150)">
    <!-- body -->
    <ellipse cx="0" cy="10" rx="28" ry="22" fill="#A8D8C8" />
    <ellipse cx="0" cy="10" rx="28" ry="22" fill="none" stroke="#7B6FA0" stroke-width="1.5" />
    <!-- head -->
    <ellipse cx="0" cy="-20" rx="22" ry="18" fill="#A8D8C8" />
    <ellipse cx="0" cy="-20" rx="22" ry="18" fill="none" stroke="#7B6FA0" stroke-width="1.5" />
    <!-- tummy -->
    <ellipse cx="0" cy="12" rx="18" ry="14" fill="#C5E8D9" opacity="0.6" />
    <!-- eyes -->
    <circle cx="-7" cy="-22" r="5" fill="#1E1833" />
    <circle cx="7" cy="-22" r="5" fill="#1E1833" />
    <circle cx="-5.5" cy="-23.5" r="2" fill="#FFFFFF" />
    <circle cx="8.5" cy="-23.5" r="2" fill="#FFFFFF" />
    <!-- mouth smile -->
    <path d="M-5,-12 Q0,-8 5,-12" fill="none" stroke="#7B6FA0" stroke-width="1.2" stroke-linecap="round" />
    <!-- blush -->
    <ellipse cx="-15" cy="-16" rx="5" ry="3" fill="#E8B4C8" opacity="0.5" />
    <ellipse cx="15" cy="-16" rx="5" ry="3" fill="#E8B4C8" opacity="0.5" />
    <!-- spikes -->
    <circle cx="-6" cy="-38" r="4" fill="#9B8EC4" />
    <circle cx="6" cy="-38" r="4" fill="#9B8EC4" />
    <circle cx="0" cy="-40" r="3.5" fill="#D4CCE6" />
    <!-- tiny arms -->
    <ellipse cx="-25" cy="5" rx="8" ry="5" fill="#A8D8C8" stroke="#7B6FA0" stroke-width="1" transform="rotate(-20 -25 5)" />
    <ellipse cx="25" cy="5" rx="8" ry="5" fill="#A8D8C8" stroke="#7B6FA0" stroke-width="1" transform="rotate(20 25 5)" />
    <!-- legs -->
    <ellipse cx="-12" cy="32" rx="8" ry="5" fill="#A8D8C8" stroke="#7B6FA0" stroke-width="1" />
    <ellipse cx="12" cy="32" rx="8" ry="5" fill="#A8D8C8" stroke="#7B6FA0" stroke-width="1" />
    <!-- tail -->
    <path d="M28,15 Q42,10 38,0" fill="none" stroke="#A8D8C8" stroke-width="8" stroke-linecap="round" />
    <path d="M28,15 Q42,10 38,0" fill="none" stroke="#7B6FA0" stroke-width="1.5" stroke-linecap="round" />
    <!-- sparkle -->
    <text x="38" y="-30" font-size="14" text-anchor="middle">🌟</text>
  </g>
  </g>
  <circle cx="40" cy="90" r="3" fill="#9B8EC4" opacity="0.3" />
  <circle cx="380" cy="100" r="2.5" fill="#A8D8C8" opacity="0.3" />
  <circle cx="60" cy="250" r="2" fill="#E8B4C8" opacity="0.3" />
  <circle cx="360" cy="240" r="3.5" fill="#D4CCE6" opacity="0.2" />
  <text x="60" y="244" font-size="10" fill="#A89EC0" text-anchor="start" font-weight="600" >EXP</text>
  <text x="360" y="244" font-size="9" fill="#A89EC0" text-anchor="end" font-weight="normal" >89 commits to next stage</text>
  <rect x="60" y="250" width="300" height="14" rx="7" fill="#252038" />
  <clipPath id="xpClip"><rect x="60" y="250" width="300" height="14" rx="7" /></clipPath>
  <rect x="60" y="250" width="211.0" height="14" rx="7" fill="url(#xpBarGrad)" clip-path="url(#xpClip)" />
  <rect x="60" y="250" width="211.0" height="7.0" rx="7" fill="#FFFFFF" opacity="0.1" clip-path="url(#xpClip)" />
  <text x="210.0" y="286" font-size="12" fill="#E8E0F0" text-anchor="middle" font-weight="600" >🔥 411 total commits</text>
  <line x1="60" y1="305" x2="360" y2="305" stroke="url(#purpleMintGradH)" stroke-width="1" stroke-opacity="0.2" />
</svg>